            { id: 15, name: "Balón de Fútbol Profesional", price: 39.99, oldPrice: 59.99, image: "https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=400", rating: 4.6, reviews: 890, stock: true, category: "deporte", desc: "Certificación FIFA, tecnología AE2000." },

            useEffect(() => { if (show) setTimeout(onClose, 3000); }, [show]);

            return <div className="fixed bottom-6 right-6 bg-primary text-white px-6 py-4 rounded-lg shadow-2xl z-50 flex items-center gap-3 fade-in"><i className="fas fa-check-circle text-green-400"></i><span>{message}</span></div>;
        };

        const Header = ({ cartCount, wishlistCount, onCartClick, onWishlistClick, currentPage, setCurrentPage, searchTerm, setSearchTerm }) => (
            <header className="fixed top-0 left-0 right-0 bg-primary z-40 shadow-lg">

                <div className="max-w-7xl mx-auto px-4 py-3">
                    <div className="flex items-center justify-between">
                        <button onClick={() => setCurrentPage('home')} className="flex items-center gap-2">

                        <div className="flex items-center gap-3">

        const Hero = ({ onCtaClick }) => (

        const ProductCard = ({ product, onAddToCart, onQuickView, onAddToWishlist, isInWishlist }) => (

        const CartDrawer = ({ isOpen, onClose, cartItems, onRemove, onUpdateQty }) => {
